# ── Base de données H2 en mémoire (mode PostgreSQL pour compatibilité syntaxique)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# ── JWT (valeurs fictives pour les tests)
jwt.secret=test-secret-key-minimum-256-bits-for-hs512-algorithm-rhconnect-test-only
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# ── Mail (serveur fictif — aucun envoi réel en test)
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@test.local
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ── Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.prometheus.enabled=false
